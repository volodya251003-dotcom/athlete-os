<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тренировки">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <title>Мои тренировки</title>
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a24;
            --card-hover: #22222e;
            --text: #f0f0f0;
            --text2: #a0a0b0;
            --accent: #ff8c42;
            --accent-light: #ffaa70;
            --green: #4ade80;
            --red: #f87171;
            --border: #2a2a38;
            --radius: 18px;
            --radius-sm: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 20px 120px; /* Увеличен отступ снизу для панели таймера */
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding-top: 60px;
            position: relative;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn {
            position: fixed;
            top: max(20px, env(safe-area-inset-top) + 8px);
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(26, 26, 36, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 30;
        }
        .back-btn.visible { display: flex; }
        .workout-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .workout-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .workout-header:hover { background: var(--card-hover); }
        .workout-type {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .workout-date { font-size: 0.85rem; color: var(--text2); }
        .duration-badge {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.8rem;
            color: var(--accent-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .workout-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .workout-card.open .workout-body {
            max-height: 5000px;
            padding: 0 20px 20px;
        }
        .timer-block {
            background: linear-gradient(135deg, #2a2a38, #1f1f2b);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .timer-display {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-light);
        }
        .timer-controls { display: flex; gap: 8px; }
        .timer-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timer-btn.primary {
            background: var(--accent);
            color: #000;
            width: 48px;
            height: 48px;
            font-size: 1.4rem;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.4);
        }
        .exercise {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 10px;
        }
        .exercise-name {
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .exercise-gif {
            width: 100%;
            border-radius: 8px;
            margin: 8px 0;
            max-height: 200px;
            object-fit: cover;
        }
        .planned {
            font-size: 0.8rem;
            color: var(--text2);
            font-weight: 400;
        }
        .set-row {
            display: flex;
            gap: 6px;
            margin: 6px 0;
            align-items: center;
            flex-wrap: wrap;
        }
        .set-row input {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 70px;
            font-family: inherit;
            text-align: center;
        }
        .set-timer-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 700;
        }
        .set-timer-display {
            font-size: 0.85rem;
            color: var(--accent-light);
            margin-left: 8px;
            font-weight: 700;
        }
        .add-set-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-accent {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(255, 140, 66, 0.3);
        }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
        .workout-comment textarea {
            width: 100%;
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }
        .type-btn {
            background: var(--border);
            border: 2px solid transparent;
            color: var(--text);
            padding: 14px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
        }
        .type-btn.selected {
            border-color: var(--accent);
            background: rgba(255, 140, 66, 0.15);
            color: var(--accent);
        }
        .report-card {
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }
        .splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f13; display: flex; align-items: center;
            justify-content: center; z-index: 999; flex-direction: column;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .splash.hide { opacity: 0; visibility: hidden; }
        .lifter { font-size: 5rem; animation: squat 0.8s ease-in-out infinite; }
        
        /* Выезжающая панель глобального таймера отдыха */
        .global-rest-panel {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--card);
            border-top: 1px solid var(--accent);
            padding: 25px 20px calc(25px + env(safe-area-inset-bottom));
            text-align: center;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            border-radius: 24px 24px 0 0;
        }
        .global-rest-panel.active { transform: translateY(0); }
        .rest-title { font-size: 0.9rem; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px;}
        .rest-time { font-size: 3.5rem; font-weight: 800; color: var(--accent); margin-bottom: 15px; font-variant-numeric: tabular-nums; }
        .rest-controls { display: flex; justify-content: center; gap: 15px; }
        
        @keyframes squat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-slide { animation: fadeSlide 0.4s ease; }

        /* Стили для аккуратного экспорта в PDF */
        @media print {
            body { background: white; color: black; padding: 0; overflow: visible; }
            .back-btn, .timer-controls, .set-timer-btn, .add-set-btn, .btn, .splash, .global-rest-panel { display: none !important; }
            .container { padding-top: 0; }
            .workout-card { border: 1px solid #ccc; background: white; break-inside: avoid; margin-bottom: 20px; }
            .workout-card.open .workout-body { padding: 10px; max-height: none; }
            .workout-body { max-height: none !important; overflow: visible; padding: 10px; }
            .exercise { border-bottom: 1px solid #eee; padding-bottom: 10px; }
            input { border: 1px solid #aaa !important; color: black !important; background: transparent !important; }
            .header h1 { background: none; color: black; -webkit-text-fill-color: black; }
        }
    </style>
</head>
<body>
    <div class="splash" id="splashScreen">
        <div class="lifter">🏋️</div>
        <div style="color:var(--accent-light);margin-top:20px;font-weight:700;">Загрузка...</div>
    </div>

    <div class="container" id="appContainer">
        <div class="header"><h1>🏋️ Мои тренировки</h1></div>
        <button class="back-btn" id="backButton" onclick="goBackToList()">←</button>
        <div id="workoutList"></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px;">
            <button class="btn btn-outline" onclick="openNewWorkoutModal()">+ Новая тренировка</button>
            <button class="btn btn-accent" onclick="exportAllPDF()">📄 Экспорт PDF</button>
        </div>
    </div>

    <div id="newWorkoutModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Новая тренировка</h3>
            <div id="typeOptions">
                <button class="type-btn" data-type="Верх (силовой)">💪 Верх (силовой)</button>
                <button class="type-btn" data-type="Низ">🦵 Низ</button>
                <button class="type-btn" data-type="Объемный верх">🏋️ Объемный верх</button>
            </div>
            <input type="date" id="newWorkoutDate" style="margin:16px 0;background:var(--border);border:none;color:var(--text);padding:12px;border-radius:8px;width:100%;text-align:center;font-family:inherit;">
            <div style="display:flex;gap:10px;justify-content:center;">
                <button class="btn btn-outline btn-sm" onclick="closeModal()">Отмена</button>
                <button class="btn btn-sm" style="background:var(--accent);color:#000;" id="createWorkoutBtn">Создать</button>
            </div>
        </div>
    </div>

    <div id="reportModal" class="modal-overlay" style="display:none;">
        <div class="modal" style="max-width:400px;" id="reportContent"></div>
    </div>

    <div id="autoRestPanel" class="global-rest-panel">
        <div class="rest-title">Отдых между подходами</div>
        <div class="rest-time" id="autoRestDisplay">01:30</div>
        <div class="rest-controls">
            <button class="btn btn-outline" onclick="adjustRestTime(-30)">-30с</button>
            <button class="btn btn-accent" onclick="closeRestTimer()">Пропустить</button>
            <button class="btn btn-outline" onclick="adjustRestTime(30)">+30с</button>
        </div>
    </div>

    <script>
        // GIF-анимации упражнений
        const exerciseGifs = {
            'Жим штанги лежа': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-47.gif',
            'Тяга верхнего блока': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-48.gif',
            'Жим гантелей под наклоном': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-49.gif',
            'Тяга сидя к поясу': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-50.gif',
            'Face Pull': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-51.gif',
            'Подъем штанги на бицепс': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-52.gif',
            'Разгибание рук на блоке': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-53.gif',
            'Жим ногами': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-54.gif',
            'Болгарские приседы': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-55.gif',
            'Румынская тяга': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-56.gif',
            'Разгибание ног': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-57.gif',
            'Ягодичный мост': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-58.gif',
            'Dead Bug': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-59.gif',
            'Боковая планка': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-60.gif',
            'Тяга гантели одной рукой': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-61.gif',
            'Верхний блок узким хватом': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-62.gif',
            'Обратная бабочка': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-63.gif',
            'Подъем гантелей на наклонной': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-64.gif',
            'Молотки': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-65.gif',
            'Подъемы в стороны': 'https://www.icegif.com/wp-content/uploads/2023/05/icegif-66.gif'
        };

        const workoutTemplates = {
            'Верх (силовой)': [
                { name: 'Жим штанги лежа', sets: 4, reps: '5–6', weights: ['90', '95', '100', '90'] },
                { name: 'Тяга верхнего блока', sets: 4, reps: '8–10', weights: ['70', '70', '75', '75'] },
                { name: 'Жим гантелей под наклоном', sets: 3, reps: '8–10', weights: ['30', '32', '35'] },
                { name: 'Тяга сидя к поясу', sets: 3, reps: '10', weights: ['50', '55', '55'] },
                { name: 'Face Pull', sets: 3, reps: '15', weights: ['27', '30', '27.5'] },
                { name: 'Подъем штанги на бицепс', sets: 3, reps: '6–8', weights: ['32.5', '32.5', '32.5'] },
                { name: 'Разгибание рук на блоке', sets: 3, reps: '10–12', weights: ['30', '35', '35'] }
            ],
            'Низ': [
                { name: 'Жим ногами', sets: 4, reps: '10', weights: ['120', '150', '170', '170'] },
                { name: 'Болгарские приседы', sets: 3, reps: '10', weights: ['12', '12', '12'] },
                { name: 'Румынская тяга', sets: 3, reps: '10', weights: ['20', '20', '22'] },
                { name: 'Разгибание ног', sets: 3, reps: '12', weights: ['50', '55', '55'] },
                { name: 'Ягодичный мост', sets: 3, reps: '12', weights: ['40', '40', '40'] },
                { name: 'Dead Bug', sets: 3, reps: '12', weights: ['—', '—', '—'] },
                { name: 'Боковая планка', sets: 3, reps: '30–40 сек', weights: ['—', '—', '—'] }
            ],
            'Объемный верх': [
                { name: 'Жим штанги лежа (без макс.)', sets: 4, reps: '8–10', weights: ['80', '85', '85', '80'] },
                { name: 'Тяга гантели одной рукой', sets: 3, reps: '10', weights: ['28', '30', '34'] },
                { name: 'Верхний блок узким хватом', sets: 3, reps: '10–12', weights: ['70', '70', '60'] },
                { name: 'Обратная бабочка', sets: 3, reps: '15', weights: ['?', '?', '?'] },
                { name: 'Подъем гантелей на наклонной', sets: 3, reps: '8–10', weights: ['12', '14', '14'] },
                { name: 'Молотки', sets: 3, reps: '10–12', weights: ['14', '14', '14'] },
                { name: 'Подъемы в стороны', sets: 3, reps: '12–15', weights: ['8', '10', '10'] }
            ]
        };

        const LS_KEY = 'my_workouts_v1';
        let workouts = JSON.parse(localStorage.getItem(LS_KEY)) || [];
        const activeTimers = {};
        const setTimers = {};
        let currentOpenId = null;
        let selectedType = null;
        
        // Глобальные переменные для авто-таймера отдыха
        let autoRestInterval = null;
        let currentRestSeconds = 0;

        if (workouts.length === 0) {
            workouts.push(createNewWorkout('Верх (силовой)', new Date().toISOString().slice(0, 10)));
            save();
        }

        function createNewWorkout(type, date) {
            const template = workoutTemplates[type] || [];
            const exercises = template.map(ex => ({
                name: ex.name,
                plannedReps: ex.reps,
                plannedWeights: [...ex.weights],
                sets: ex.weights.map(w => ({ weight: w, reps: '', comment: '', setTime: 0 }))
            }));
            return { id: Date.now(), type, date, duration: 0, exercises, comment: '', completed: false };
        }

        function save() { localStorage.setItem(LS_KEY, JSON.stringify(workouts)); }

        // Splash
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.classList.add('hide');
                splash.addEventListener('transitionend', () => splash.remove(), { once: true });
            }, 2200);
            render();
        });

        const workoutList = document.getElementById('workoutList');
        const backButton = document.getElementById('backButton');

        function formatTime(s) { 
            const m = Math.floor(s / 60);
            const sec = s % 60; 
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; 
        }

        function formatDate(d) { const [y, m, day] = d.split('-'); return `${day}.${m}.${y}`; }

        function render() {
            backButton.classList.toggle('visible', !!currentOpenId);
            const sorted = [...workouts].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            workoutList.innerHTML = sorted.map(w => {
                const isOpen = w.id === currentOpenId;
                const timerRunning = activeTimers[w.id] && activeTimers[w.id].intervalId !== null;
                const displaySeconds = timerRunning ? activeTimers[w.id].seconds : w.duration;
                const hasTime = w.duration > 0 || (activeTimers[w.id] && activeTimers[w.id].seconds > 0);
                return `
                <div class="workout-card fade-slide ${isOpen?'open':''}" data-id="${w.id}">
                    <div class="workout-header" onclick="toggleWorkout(${w.id})">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <span class="workout-type">${w.type}</span>
                            ${hasTime?`<span class="duration-badge">⏱ ${formatTime(displaySeconds)}</span>`:''}
                            ${w.completed?'<span style="color:var(--green);">✅</span>':''}
                        </div>
                        <span class="workout-date">${formatDate(w.date)}</span>
                    </div>
                    <div class="workout-body">
                        <div class="timer-block">
                            <div class="timer-display" id="timer-${w.id}">${formatTime(displaySeconds)}</div>
                            <div class="timer-controls">
                                ${!w.completed?`
                                    ${!timerRunning?`<button class="timer-btn primary" onclick="startTimer(${w.id})">▶</button>`:''}
                                    ${timerRunning?`<button class="timer-btn" onclick="pauseTimer(${w.id})">⏸</button>`:''}
                                    ${!timerRunning&&w.duration>0?`<button class="timer-btn" onclick="resetTimer(${w.id})">↺</button>`:''}
                                `:''}
                            </div>
                        </div>
                        ${w.exercises.map((ex,exIdx)=>`
                            <div class="exercise">
                                <div class="exercise-name"><span>${ex.name}</span><span class="planned">План: ${ex.plannedWeights.join(' / ')} кг × ${ex.plannedReps}</span></div>
                                ${exerciseGifs[ex.name]?`<img src="${exerciseGifs[ex.name]}" class="exercise-gif" alt="${ex.name}" loading="lazy">`:''}
                                ${ex.sets.map((set,setIdx)=>`
                                    <div class="set-row">
                                        <span style="min-width:20px;color:var(--text2);">${setIdx+1}.</span>
                                        <input type="text" inputmode="decimal" placeholder="${set.weight}" value="${set.weight}" onchange="updateSet(${w.id},${exIdx},${setIdx},'weight',this.value)" ${w.completed?'disabled':''}>
                                        <span>×</span>
                                        <input type="number" min="0" placeholder="Повт." value="${set.reps}" onchange="updateSet(${w.id},${exIdx},${setIdx},'reps',this.value)" ${w.completed?'disabled':''}>
                                        <input type="text" placeholder="Комм." value="${set.comment}" onchange="updateSet(${w.id},${exIdx},${setIdx},'comment',this.value)" ${w.completed?'disabled':''}>
                                        ${!w.completed?`
                                            <button class="set-timer-btn" onclick="toggleSetTimer(${w.id},${exIdx},${setIdx})">⏱</button>
                                            <span class="set-timer-display" id="set-timer-${w.id}-${exIdx}-${setIdx}">${formatTime(set.setTime||0)}</span>
                                        `:`<span class="set-timer-display">${formatTime(set.setTime||0)}</span>`}
                                    </div>
                                `).join('')}
                                ${!w.completed?`<button class="add-set-btn" onclick="addSet(${w.id},${exIdx})">+ Подход</button>`:''}
                            </div>
                        `).join('')}
                        <div class="workout-comment"><textarea placeholder="Общий комментарий..." onchange="updateWorkoutComment(${w.id},this.value)" ${w.completed?'disabled':''}>${w.comment||''}</textarea></div>
                        <div style="display:flex;gap:8px;margin-top:12px;">
                            ${!w.completed?`<button class="btn btn-accent" onclick="finishWorkout(${w.id})">🏁 Завершить тренировку</button>`:''}
                            <button class="btn btn-outline btn-sm" onclick="deleteWorkout(${w.id})">🗑 Удалить</button>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<p style="text-align:center;color:var(--text2);">Пока нет тренировок.</p>';
        }

        // Логика автоматического таймера отдыха (вызывается при вводе повторений)
        window.startAutoRestTimer = function(seconds = 90) { // По умолчанию 90 секунд (1.5 минуты)
            const panel = document.getElementById('autoRestPanel');
            const display = document.getElementById('autoRestDisplay');
            
            clearInterval(autoRestInterval);
            currentRestSeconds = seconds;
            display.textContent = formatTime(currentRestSeconds);
            panel.classList.add('active');
            
            autoRestInterval = setInterval(() => {
                currentRestSeconds--;
                if (currentRestSeconds < 0) currentRestSeconds = 0;
                display.textContent = formatTime(currentRestSeconds);
                
                if (currentRestSeconds <= 0) {
                    clearInterval(autoRestInterval);
                    playBeep();
                    panel.classList.remove('active');
                }
            }, 1000);
        };

        window.closeRestTimer = function() {
            clearInterval(autoRestInterval);
            document.getElementById('autoRestPanel').classList.remove('active');
        };

        window.adjustRestTime = function(delta) {
            currentRestSeconds += delta;
            if (currentRestSeconds < 0) currentRestSeconds = 0;
            document.getElementById('autoRestDisplay').textContent = formatTime(currentRestSeconds);
        };

        // Системный звук браузера (без загрузки mp3)
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) { console.log('Аудио не поддерживается'); }
        }

        // Таймеры индивидуальных подходов (ручные)
        window.toggleSetTimer = function(wid, exIdx, setIdx) {
            const key = `${wid}-${exIdx}-${setIdx}`;
            if (setTimers[key] && setTimers[key].running) {
                clearInterval(setTimers[key].interval);
                setTimers[key].running = false;
                const w = workouts.find(x => x.id === wid);
                if (w) w.exercises[exIdx].sets[setIdx].setTime = setTimers[key].seconds;
                save();
                render();
            } else {
                const w = workouts.find(x => x.id === wid);
                if (!w) return;
                const currentSeconds = w.exercises[exIdx].sets[setIdx].setTime || 0;
                setTimers[key] = {
                    interval: setInterval(() => {
                        setTimers[key].seconds++;
                        const el = document.getElementById('set-timer-' + key);
                        if (el) el.textContent = formatTime(setTimers[key].seconds);
                    }, 1000),
                    seconds: currentSeconds,
                    running: true
                };
                render();
            }
        };

        window.toggleWorkout = function(id) {
            if (currentOpenId === id) {
                if (activeTimers[id]) { pauseTimerInternal(id); saveTimerDuration(id); }
                currentOpenId = null;
            } else {
                if (currentOpenId && activeTimers[currentOpenId]) { pauseTimerInternal(currentOpenId); saveTimerDuration(currentOpenId); }
                currentOpenId = id;
                const w = workouts.find(x => x.id === id);
                if (w && !w.completed && activeTimers[id] && !activeTimers[id].intervalId) {
                    startTimerInternal(id);
                }
            }
            render();
        };

        window.goBackToList = function() {
            if (currentOpenId && activeTimers[currentOpenId]) { pauseTimerInternal(currentOpenId); saveTimerDuration(currentOpenId); }
            currentOpenId = null;
            render();
        };

        window.startTimer = function(id) {
            const w = workouts.find(x => x.id === id);
            if (!w || w.completed) return;
            if (activeTimers[id]) clearInterval(activeTimers[id].intervalId);
            activeTimers[id] = { intervalId: null, seconds: w.duration || 0 };
            startTimerInternal(id);
            save();
            render();
        };

        function startTimerInternal(id) {
            if (!activeTimers[id]) return;
            activeTimers[id].intervalId = setInterval(() => {
                activeTimers[id].seconds++;
                const d = document.getElementById('timer-' + id);
                if (d) d.textContent = formatTime(activeTimers[id].seconds);
            }, 1000);
        }

        window.pauseTimer = function(id) {
            pauseTimerInternal(id);
            saveTimerDuration(id);
            render();
        };

        function pauseTimerInternal(id) {
            if (activeTimers[id] && activeTimers[id].intervalId) {
                clearInterval(activeTimers[id].intervalId);
                activeTimers[id].intervalId = null;
            }
        }

        function saveTimerDuration(id) {
            const w = workouts.find(x => x.id === id);
            if (w && activeTimers[id]) w.duration = activeTimers[id].seconds;
            save();
        }

        window.resetTimer = function(id) {
            if (activeTimers[id]) { clearInterval(activeTimers[id].intervalId); delete activeTimers[id]; }
            const w = workouts.find(x => x.id === id);
            if (w) w.duration = 0;
            save();
            render();
        };

        window.finishWorkout = function(id) {
            const w = workouts.find(x => x.id === id);
            if (!w) return;
            if (activeTimers[id]) {
                clearInterval(activeTimers[id].intervalId);
                w.duration = activeTimers[id].seconds;
                delete activeTimers[id];
            }
            w.completed = true;

            const sameType = workouts.filter(x => x.type === w.type && x.id !== id && x.completed);
            sameType.sort((a, b) => b.date.localeCompare(a.date));
            const prev = sameType[0];

            let reportHTML = `<h2>🏁 Тренировка завершена!</h2>
            <p><strong>${w.type}</strong> — ${formatDate(w.date)}</p>
            <p>⏱ Общее время: ${formatTime(w.duration)}</p>
            <p>📋 Упражнений: ${w.exercises.length}</p>`;

            if (prev) {
                const timeDiff = w.duration - prev.duration;
                const sign = timeDiff > 0 ? '+' : '';
                reportHTML += `<h3>📊 Сравнение с предыдущей (${formatDate(prev.date)})</h3>
                <p>⏱ Время: ${formatTime(prev.duration)} → ${formatTime(w.duration)} (${sign}${formatTime(Math.abs(timeDiff))})</p>`;
            } else {
                reportHTML += '<p>🥇 Это твоя первая тренировка этого типа!</p>';
            }

            reportHTML += `<button class="btn btn-accent" onclick="closeReport()" style="margin-top:16px;">ОК</button>`;
            document.getElementById('reportContent').innerHTML = reportHTML;
            document.getElementById('reportModal').style.display = 'flex';
            save();
            render();
        };

        window.closeReport = function() { document.getElementById('reportModal').style.display = 'none'; };

        window.updateSet = function(wid, exIdx, setIdx, field, value) {
            const w = workouts.find(x => x.id === wid);
            if (!w || w.completed) return;
            w.exercises[exIdx].sets[setIdx][field] = value;
            save();

            // Если введено количество повторений — запускаем таймер отдыха автоматически
            if (field === 'reps' && value.trim() !== '') {
                startAutoRestTimer(90); // Меняй 90 на любое базовое время (в секундах)
            }
        };

        window.addSet = function(wid, exIdx) {
            const w = workouts.find(x => x.id === wid);
            if (!w || w.completed) return;
            w.exercises[exIdx].sets.push({ weight: '', reps: '', comment: '', setTime: 0 });
            save();
            currentOpenId = wid;
            render();
        };

        window.updateWorkoutComment = function(wid, value) {
            const w = workouts.find(x => x.id === wid);
            if (!w || w.completed) return;
            w.comment = value;
            save();
        };

        window.deleteWorkout = function(id) {
            if (!confirm('Удалить?')) return;
            if (activeTimers[id]) { clearInterval(activeTimers[id].intervalId); delete activeTimers[id]; }
            workouts = workouts.filter(x => x.id !== id);
            if (currentOpenId === id) currentOpenId = null;
            save();
            render();
        };

        // Экспорт в PDF 
        window.exportAllPDF = function() {
            // Раскрываем все карточки перед печатью
            document.querySelectorAll('.workout-card').forEach(card => card.classList.add('open'));
            // Даем браузеру долю секунды на рендер CSS-переходов перед печатью
            setTimeout(() => {
                window.print();
                // Возвращаем UI в исходное состояние (скрываем обратно, кроме активной)
                render();
            }, 300);
        };

        // Модальное окно создания тренировки
        const modal = document.getElementById('newWorkoutModal');
        const typeButtons = document.querySelectorAll('#typeOptions .type-btn');
        const dateInput = document.getElementById('newWorkoutDate');
        const createBtn = document.getElementById('createWorkoutBtn');

        window.openNewWorkoutModal = function() {
            selectedType = null;
            dateInput.value = new Date().toISOString().slice(0, 10);
            typeButtons.forEach(b => b.classList.remove('selected'));
            modal.style.display = 'flex';
        };

        window.closeModal = function() { modal.style.display = 'none'; };

        typeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                typeButtons.forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedType = btn.dataset.type;
            });
        });

        // Завершение функции создания новой тренировки
        createBtn.addEventListener('click', () => {
            if (!selectedType) { alert('Выбери тип тренировки.'); return; }
            const date = dateInput.value;
            if (!date) return;
            
            closeModal();
            const newWorkout = createNewWorkout(selectedType, date);
            workouts.push(newWorkout);
            currentOpenId = newWorkout.id; // Сразу открываем созданную
            save();
            render();
        });
    </script>
</body>
</html>
