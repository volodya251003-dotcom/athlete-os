<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Тренировки">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="manifest" href="manifest.json">
    <title>Мои тренировки</title>
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a24;
            --card-hover: #22222e;
            --text: #f0f0f0;
            --text2: #a0a0b0;
            --accent: #ff8c42;
            --accent-light: #ffaa70;
            --green: #4ade80;
            --red: #f87171;
            --border: #2a2a38;
            --radius: 18px;
            --radius-sm: 12px;
            --transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent), #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .workout-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
            transition: all var(--transition);
        }
        .workout-header {
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .workout-header:hover {
            background: var(--card-hover);
        }
        .workout-type {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }
        .workout-date {
            font-size: 0.85rem;
            color: var(--text2);
        }
        .workout-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
        }
        .workout-card.open .workout-body {
            max-height: 2000px;
            padding: 0 20px 20px;
        }
        .exercise {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 10px;
        }
        .exercise-name {
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .planned {
            font-size: 0.8rem;
            color: var(--text2);
            font-weight: 400;
        }
        .set-row {
            display: flex;
            gap: 6px;
            margin: 6px 0;
            align-items: center;
            flex-wrap: wrap;
        }
        .set-row input {
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            width: 70px;
            font-family: inherit;
        }
        .set-row input.weight-input {
            width: 80px;
        }
        .set-row input.comment-input {
            flex: 1;
            min-width: 120px;
        }
        .add-set-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 6px;
        }
        .add-set-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: -0.01em;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            box-shadow: 0 8px 20px rgba(255, 140, 66, 0.3);
        }
        .btn-primary:hover {
            background: var(--accent-light);
            transform: scale(1.03);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }
        .workout-comment {
            margin-top: 12px;
        }
        .workout-comment textarea {
            width: 100%;
            background: var(--border);
            border: none;
            color: var(--text);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        .save-indicator {
            font-size: 0.75rem;
            color: var(--green);
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .save-indicator.show {
            opacity: 1;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .fade-slide {
            animation: fadeSlide 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ Мои тренировки</h1>
        <div id="workoutList"></div>
        <button class="btn btn-outline" style="width:100%; margin-top:20px;" id="addWorkoutBtn">+ Новая тренировка</button>
    </div>

    <script>
        // ========== Шаблоны тренировок ==========
        const workoutTemplates = {
            'Верх (силовой)': [
                { name: 'Жим штанги лежа', sets: 4, reps: '5–6', weights: ['90', '95', '100', '90'] },
                { name: 'Тяга верхнего блока', sets: 4, reps: '8–10', weights: ['70', '70', '75', '75'] },
                { name: 'Жим гантелей под наклоном', sets: 3, reps: '8–10', weights: ['30', '32', '35'] },
                { name: 'Тяга сидя к поясу', sets: 3, reps: '10', weights: ['50', '55', '55'] },
                { name: 'Face Pull', sets: 3, reps: '15', weights: ['27', '30', '27.5'] },
                { name: 'Подъем штанги на бицепс', sets: 3, reps: '6–8', weights: ['32.5', '32.5', '32.5'] },
                { name: 'Разгибание рук на блоке', sets: 3, reps: '10–12', weights: ['30', '35', '35'] }
            ],
            'Низ': [
                { name: 'Жим ногами', sets: 4, reps: '10', weights: ['120', '150', '170', '170'] },
                { name: 'Болгарские приседы', sets: 3, reps: '10', weights: ['12', '12', '12'] },
                { name: 'Румынская тяга', sets: 3, reps: '10', weights: ['20', '20', '22'] },
                { name: 'Разгибание ног', sets: 3, reps: '12', weights: ['50', '55', '55'] },
                { name: 'Ягодичный мост', sets: 3, reps: '12', weights: ['40', '40', '40'] },
                { name: 'Dead Bug', sets: 3, reps: '12', weights: ['—', '—', '—'] },
                { name: 'Боковая планка', sets: 3, reps: '30–40 сек', weights: ['—', '—', '—'] }
            ],
            'Объемный верх': [
                { name: 'Жим штанги лежа (без макс.)', sets: 4, reps: '8–10', weights: ['80', '85', '85', '80'] },
                { name: 'Тяга гантели одной рукой', sets: 3, reps: '10', weights: ['28', '30', '34'] },
                { name: 'Верхний блок узким хватом', sets: 3, reps: '10–12', weights: ['70', '70', '60'] },
                { name: 'Обратная бабочка', sets: 3, reps: '15', weights: ['?', '?', '?'] },
                { name: 'Подъем гантелей на наклонной', sets: 3, reps: '8–10', weights: ['12', '14', '14'] },
                { name: 'Молотки', sets: 3, reps: '10–12', weights: ['14', '14', '14'] },
                { name: 'Подъемы в стороны', sets: 3, reps: '12–15', weights: ['8', '10', '10'] }
            ]
        };

        // ========== Данные ==========
        const LS_KEY = 'my_workouts_v1';
        let workouts = JSON.parse(localStorage.getItem(LS_KEY)) || [];

        // Если тренировок ещё нет, добавим одну для примера (сегодняшнюю)
        if (workouts.length === 0) {
            const today = new Date().toISOString().slice(0, 10);
            workouts.push(createNewWorkout('Верх (силовой)', today));
            save();
        }

        function createNewWorkout(type, date) {
            const template = workoutTemplates[type] || [];
            const exercises = template.map(ex => ({
                name: ex.name,
                plannedReps: ex.reps,
                plannedWeights: [...ex.weights],
                sets: ex.weights.map(w => ({ weight: w, reps: '', comment: '' }))
            }));
            return {
                id: Date.now(),
                type,
                date,
                exercises,
                comment: ''
            };
        }

        function save() {
            localStorage.setItem(LS_KEY, JSON.stringify(workouts));
        }

        // ========== Рендеринг ==========
        const workoutList = document.getElementById('workoutList');

        function render() {
            const sorted = [...workouts].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
            workoutList.innerHTML = sorted.map(w => {
                const isOpen = w.id === currentOpenId;
                return `
                <div class="workout-card fade-slide ${isOpen ? 'open' : ''}" data-id="${w.id}">
                    <div class="workout-header" onclick="toggleWorkout(${w.id})">
                        <span class="workout-type">${w.type}</span>
                        <span class="workout-date">${formatDate(w.date)}</span>
                    </div>
                    <div class="workout-body">
                        ${w.exercises.map((ex, exIdx) => `
                            <div class="exercise">
                                <div class="exercise-name">
                                    <span>${ex.name}</span>
                                    <span class="planned">План: ${ex.plannedWeights.join(' / ')} кг × ${ex.plannedReps}</span>
                                </div>
                                ${ex.sets.map((set, setIdx) => `
                                    <div class="set-row">
                                        <span style="min-width:20px;color:var(--text2);">${setIdx+1}.</span>
                                        <input class="weight-input" type="text" placeholder="${set.weight}" value="${set.weight}" onchange="updateSet(${w.id}, ${exIdx}, ${setIdx}, 'weight', this.value)">
                                        <span style="color:var(--text2);">×</span>
                                        <input type="text" placeholder="Повт." value="${set.reps}" onchange="updateSet(${w.id}, ${exIdx}, ${setIdx}, 'reps', this.value)">
                                        <input class="comment-input" type="text" placeholder="Комментарий" value="${set.comment}" onchange="updateSet(${w.id}, ${exIdx}, ${setIdx}, 'comment', this.value)">
                                    </div>
                                `).join('')}
                                <button class="add-set-btn" onclick="addSet(${w.id}, ${exIdx})">+ Подход</button>
                            </div>
                        `).join('')}
                        <div class="workout-comment">
                            <textarea placeholder="Общий комментарий к тренировке..." onchange="updateWorkoutComment(${w.id}, this.value)">${w.comment || ''}</textarea>
                        </div>
                        <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="deleteWorkout(${w.id})">🗑 Удалить</button>
                        <span class="save-indicator" id="save-${w.id}">✓ Сохранено</span>
                    </div>
                </div>
                `;
            }).join('');

            // Если нет тренировок
            if (sorted.length === 0) {
                workoutList.innerHTML = '<p style="text-align:center;color:var(--text2);">Пока нет тренировок. Добавь новую!</p>';
            }
        }

        let currentOpenId = null;

        window.toggleWorkout = function(id) {
            if (currentOpenId === id) {
                currentOpenId = null;
            } else {
                currentOpenId = id;
            }
            render();
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}.${y}`;
        }

        // ========== Обновление данных ==========
        window.updateSet = function(workoutId, exIdx, setIdx, field, value) {
            const workout = workouts.find(w => w.id === workoutId);
            if (!workout) return;
            workout.exercises[exIdx].sets[setIdx][field] = value;
            save();
            showSavedIndicator(workoutId);
        };

        window.addSet = function(workoutId, exIdx) {
            const workout = workouts.find(w => w.id === workoutId);
            if (!workout) return;
            workout.exercises[exIdx].sets.push({ weight: '', reps: '', comment: '' });
            save();
            render();
            currentOpenId = workoutId;
            render(); // перерендерить с открытым
        };

        window.updateWorkoutComment = function(workoutId, value) {
            const workout = workouts.find(w => w.id === workoutId);
            if (!workout) return;
            workout.comment = value;
            save();
            showSavedIndicator(workoutId);
        };

        window.deleteWorkout = function(id) {
            if (confirm('Удалить эту тренировку?')) {
                workouts = workouts.filter(w => w.id !== id);
                if (currentOpenId === id) currentOpenId = null;
                save();
                render();
            }
        };

        function showSavedIndicator(id) {
            const el = document.getElementById('save-' + id);
            if (el) {
                el.classList.add('show');
                setTimeout(() => el.classList.remove('show'), 1500);
            }
        }

        // ========== Добавление новой тренировки ==========
        document.getElementById('addWorkoutBtn').addEventListener('click', () => {
            const type = prompt('Тип тренировки:\n1 - Верх (силовой)\n2 - Низ\n3 - Объемный верх', '1');
            let selectedType;
            if (type === '1') selectedType = 'Верх (силовой)';
            else if (type === '2') selectedType = 'Низ';
            else if (type === '3') selectedType = 'Объемный верх';
            else return;

            const date = prompt('Дата (ГГГГ-ММ-ДД)', new Date().toISOString().slice(0, 10));
            if (!date) return;

            workouts.push(createNewWorkout(selectedType, date));
            save();
            currentOpenId = workouts[workouts.length - 1].id;
            render();
            // прокрутка к новой карточке
            setTimeout(() => {
                const card = document.querySelector(`[data-id="${currentOpenId}"]`);
                if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        });

        // Initial render
        render();
    </script>
</body>
</html>
